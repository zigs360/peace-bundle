services:
  - type: web
    name: peace-bundlle-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --no-audit --no-fund
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SYNC
        value: safe
      - key: REQUEST_TIMEOUT_MS
        value: 120000
      - key: DATABASE_URL
        fromDatabase:
          name: peace-bundlle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.peacebundle.com

databases:
  - name: peace-bundle-db
    plan: free
    databaseName: peacebundle
    user: peacebundle_user
