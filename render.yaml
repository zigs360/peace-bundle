services:
  - type: web
    name: peace-bundlle-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: peace-bundlle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.peacebundlle.com

databases:
  - name: peace-bundlle-db
    plan: free
    databaseName: peacebundlle
    user: peacebundlle_user
